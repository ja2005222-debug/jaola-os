<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA OS | Mission Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: #0a0c10;
            color: #e5e7eb;
        }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #1a1d24; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .activity-item {
            border-right: 2px solid;
            padding-right: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .activity-item:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- ========== SIDEBAR ========== -->
    <aside class="w-80 bg-zinc-900/50 border-l border-zinc-800 flex flex-col shrink-0">
        <!-- Logo -->
        <div class="p-6 border-b border-zinc-800">
            <h1 class="text-2xl font-bold">JAOLA OS</h1>
            <p class="text-zinc-400 text-sm">Autonomous Software Team</p>
        </div>

        <!-- Projects -->
        <div class="p-4">
            <h3 class="text-sm text-zinc-500 mb-3">PROJECTS</h3>
            <div id="projectsList" class="space-y-2"></div>
            <button id="newProjectBtn" class="mt-3 w-full text-center text-sm text-zinc-400 hover:text-white transition">+ New project</button>
        </div>

        <!-- AI Team -->
        <div class="p-4 border-t border-zinc-800 flex-1">
            <h3 class="text-sm text-zinc-500 mb-3">AI TEAM</h3>
            <div id="agentsList" class="space-y-2"></div>
        </div>

        <!-- User -->
        <div class="p-4 border-t border-zinc-800 flex items-center gap-3">
            <i class="fas fa-user-circle text-3xl text-zinc-500"></i>
            <div>
                <div id="usernameDisplay" class="font-medium">Loading...</div>
                <button id="logoutBtn" class="text-xs text-zinc-500 hover:text-white">Sign out</button>
            </div>
        </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Top Bar -->
        <header class="h-16 border-b border-zinc-800 flex items-center justify-between px-6 shrink-0">
            <div>
                <h2 id="activeProjectName" class="font-semibold">Travel Platform</h2>
                <p id="lastActivity" class="text-xs text-zinc-500">Last activity —</p>
            </div>
            <div class="flex gap-3">
                <button id="deployBtn" class="rounded-lg bg-zinc-800 px-4 py-2 hover:bg-zinc-700 transition">Deploy</button>
                <button id="newMissionBtn" class="rounded-lg bg-blue-600 px-4 py-2 hover:bg-blue-700 transition">New Mission</button>
            </div>
        </header>

        <!-- Scrollable Dashboard Area -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">

            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                    <p class="text-zinc-400 text-sm">Tasks</p>
                    <h3 id="kpiTasks" class="text-3xl font-bold">—</h3>
                </div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                    <p class="text-zinc-400 text-sm">Success Rate</p>
                    <h3 id="kpiSuccess" class="text-3xl font-bold">—</h3>
                </div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                    <p class="text-zinc-400 text-sm">Deployments</p>
                    <h3 id="kpiDeployments" class="text-3xl font-bold">—</h3>
                </div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                    <p class="text-zinc-400 text-sm">AutoFix</p>
                    <h3 id="kpiAutoFix" class="text-3xl font-bold">—</h3>
                </div>
            </div>

            <!-- Software Lifecycle -->
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-6">
                <h3 class="font-semibold mb-6">Software Lifecycle</h3>
                <div id="workflowSteps" class="flex justify-between items-center flex-wrap gap-3"></div>
            </div>

            <!-- Two columns: Chat + Activity Feed -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Chat Panel -->
                <div class="lg:col-span-2 rounded-2xl border border-zinc-800 bg-zinc-900/30 flex flex-col h-[550px]">
                    <div id="chatMessages" class="flex-1 p-6 overflow-y-auto space-y-4 scrollbar-thin"></div>
                    <div class="border-t border-zinc-800 p-4">
                        <div class="flex gap-3">
                            <input type="text" id="chatInput" class="flex-1 rounded-xl bg-zinc-800 p-4 outline-none focus:ring-1 focus:ring-blue-500" placeholder="Describe your mission...">
                            <button id="sendChatBtn" class="rounded-xl bg-blue-600 px-6 hover:bg-blue-700 transition">Execute</button>
                        </div>
                    </div>
                </div>

                <!-- Activity Feed & Recent Decisions -->
                <div class="space-y-6">
                    <!-- Activity Feed -->
                    <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                        <h3 class="font-semibold mb-4">Activity Feed</h3>
                        <div id="activityFeed" class="text-sm space-y-2 max-h-64 overflow-y-auto scrollbar-thin"></div>
                    </div>
                    <!-- Recent Decisions -->
                    <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-5">
                        <h3 class="font-semibold mb-4">Recent Decisions</h3>
                        <div id="recentDecisions" class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin"></div>
                    </div>
                </div>
            </div>

            <!-- Architecture Explorer (optional) -->
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/30 p-6">
                <h3 class="font-semibold mb-4">Architecture Explorer</h3>
                <div id="architectureTree" class="text-sm overflow-x-auto max-h-64 scrollbar-thin"></div>
            </div>

        </div>
    </main>

    <script>
        // ---------- State & Globals ----------
        let token = localStorage.getItem('token');
        let ws = null;
        let currentProjectId = null;

        // Helper: redirect to login if no token
        if (!token) {
            window.location.href = '/user.html';
        }

        // ---------- Helper functions ----------
        function addActivity(message, type = 'info') {
            const feed = document.getElementById('activityFeed');
            const div = document.createElement('div');
            div.className = `activity-item border-${type === 'error' ? 'red' : type === 'success' ? 'green' : 'blue'}-500 text-xs`;
            div.innerHTML = `<span class="text-zinc-400">${new Date().toLocaleTimeString()}</span> — ${message}`;
            feed.prepend(div);
            if (feed.children.length > 30) feed.removeChild(feed.lastChild);
        }

        function addChatMessage(role, content, agent = null) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-3xl ${role === 'user' ? 'bg-blue-600' : 'bg-zinc-800'} rounded-2xl p-3">
                    ${agent ? `<div class="text-xs text-zinc-400 mb-1">${agent}</div>` : ''}
                    <div class="whitespace-pre-wrap">${escapeHtml(content)}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/\n/g, '<br>');
        }

        // ---------- WebSocket ----------
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onopen = () => addActivity('WebSocket connected', 'success');
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'task_update') {
                        let statusText = data.status === 'running' ? '🔵 running' : data.status === 'completed' ? '✅ completed' : data.status === 'failed' ? '❌ failed' : '⏳ pending';
                        addActivity(`Task ${data.taskId} ${statusText}`, data.status === 'failed' ? 'error' : 'info');
                        if (data.status === 'completed') addChatMessage('bot', `Task ${data.taskId} completed.`, 'System');
                        if (data.status === 'failed') addChatMessage('bot', `Task ${data.taskId} failed. ${data.error || ''}`, 'System');
                        refreshDashboard(); // quick refresh
                    }
                    if (data.type === 'plan_update') {
                        addActivity(`📋 New plan: ${data.goal}`, 'info');
                    }
                } catch(e) {}
            };
            ws.onclose = () => {
                addActivity('WebSocket disconnected, reconnecting in 3s...', 'error');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // ---------- Dashboard Data Fetch ----------
        async function refreshDashboard() {
            try {
                // KPI
                const kpis = await fetch('/api/kpis').then(r => r.json());
                document.getElementById('kpiTasks').innerText = kpis.totalTasks || 0;
                const successRate = kpis.deploySuccessRate || 0;
                document.getElementById('kpiSuccess').innerText = `${successRate}%`;
                document.getElementById('kpiDeployments').innerText = kpis.deploySuccessRate ? Math.round((kpis.deploySuccessRate/100)* (kpis.totalTasks||0)) : 0;
                document.getElementById('kpiAutoFix').innerText = `${kpis.autoFixRate || 0}%`;

                // Workflow
                const workflow = await fetch('/api/workflow/status/live').then(r => r.json());
                const stepsContainer = document.getElementById('workflowSteps');
                stepsContainer.innerHTML = workflow.map(step => `
                    <div class="text-center">
                        <div class="text-sm ${step.status === 'current' ? 'text-blue-400 font-bold' : step.status === 'completed' ? 'text-green-400' : 'text-zinc-500'}">${step.name}</div>
                        <div class="w-12 h-1 mx-auto mt-1 rounded ${step.status === 'completed' ? 'bg-green-500' : step.status === 'current' ? 'bg-blue-500' : 'bg-zinc-700'}"></div>
                    </div>
                `).join('');

                // Agents health (for sidebar)
                const agents = await fetch('/api/agents/health').then(r => r.json());
                const agentsList = document.getElementById('agentsList');
                const agentIcons = { Architect: '🧠', Planner: '📋', Coder: '💻', Reviewer: '🔍', QA: '🧪', Git: '🐙', DevOps: '🚀' };
                agentsList.innerHTML = Object.entries(agents).map(([name, info]) => `
                    <div class="rounded-lg bg-zinc-800/50 p-3 flex justify-between items-center">
                        <div><span class="ml-2">${agentIcons[name] || '🤖'}</span> ${name}</div>
                        <span class="text-xs ${info.status === 'healthy' ? 'text-green-400' : info.status === 'running' ? 'text-blue-400' : 'text-yellow-400'}">${info.status}</span>
                    </div>
                `).join('');

                // Projects list
                const projects = await fetch('/api/projects').then(r => r.json());
                const projContainer = document.getElementById('projectsList');
                const activeProj = await fetch('/api/projects/active').then(r => r.json());
                currentProjectId = activeProj?.id;
                projContainer.innerHTML = projects.map(p => `
                    <div class="rounded-xl p-3 ${p.id === currentProjectId ? 'bg-zinc-800' : 'hover:bg-zinc-800/50'} transition cursor-pointer" data-id="${p.id}">
                        ${p.name}
                    </div>
                `).join('');
                document.getElementById('activeProjectName').innerText = activeProj?.name || 'No active project';
                document.getElementById('lastActivity').innerText = `Last activity ${new Date().toLocaleTimeString()}`;

                // Recent decisions
                const decisions = await fetch('/api/decisions/center').then(r => r.json());
                const decisionsDiv = document.getElementById('recentDecisions');
                decisionsDiv.innerHTML = decisions.slice(0,5).map(d => `
                    <div class="border-r-2 border-blue-500 pl-2">
                        <div class="font-bold text-sm">${d.agent || 'System'}</div>
                        <div class="text-xs text-zinc-300">${d.decision}</div>
                        <div class="text-xs text-zinc-500">${new Date(d.timestamp).toLocaleString()}</div>
                    </div>
                `).join('');

                // Architecture Tree
                const tree = await fetch('/api/architecture/tree').then(r => r.json());
                function renderTree(obj) {
                    let html = '<ul class="space-y-1">';
                    for (const [key, val] of Object.entries(obj)) {
                        if (key === '__files') {
                            val.forEach(file => html += `<li class="text-zinc-400 mr-4">📄 ${file}</li>`);
                        } else if (typeof val === 'object') {
                            html += `<li><details><summary class="cursor-pointer hover:text-blue-400">📁 ${key}</summary>${renderTree(val)}</details></li>`;
                        } else {
                            html += `<li>📄 ${key}</li>`;
                        }
                    }
                    html += '</ul>';
                    return html;
                }
                document.getElementById('architectureTree').innerHTML = renderTree(tree);
            } catch (err) {
                console.error('Dashboard refresh error:', err);
            }
        }

        // ---------- User & Auth ----------
        async function loadUserProfile() {
            try {
                const user = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
                document.getElementById('usernameDisplay').innerText = user.username || 'User';
            } catch(e) {}
        }

        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('token');
            window.location.href = '/user.html';
        };

        // ---------- Chat (Send command) ----------
        async function sendMission(message) {
            if (!message.trim()) return;
            addChatMessage('user', message);
            document.getElementById('chatInput').value = '';
            addActivity(`📨 User: ${message.substring(0, 60)}...`, 'info');
            try {
                const res = await fetch('/api/user/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                if (res.ok) {
                    addChatMessage('bot', `✅ Mission received (plan: ${data.planId}). Executing...`, 'JAOLA');
                    refreshDashboard();
                } else {
                    addChatMessage('bot', `❌ Error: ${data.error || 'Unknown'}`, 'JAOLA');
                    addActivity(`❌ Mission failed: ${data.error}`, 'error');
                }
            } catch (err) {
                addChatMessage('bot', `❌ Network error: ${err.message}`, 'JAOLA');
                addActivity(`❌ Network error: ${err.message}`, 'error');
            }
        }

        // ---------- New Mission & Deploy buttons ----------
        document.getElementById('newMissionBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            if (input.value.trim()) sendMission(input.value.trim());
            else input.focus();
        };
        document.getElementById('deployBtn').onclick = () => {
            sendMission("Deploy the current project to Vercel");
        };
        document.getElementById('sendChatBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            sendMission(input.value);
        };
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMission(e.target.value);
        });

        // Handle project selection (simplified: just show info)
        document.addEventListener('click', (e) => {
            const projectDiv = e.target.closest('[data-id]');
            if (projectDiv && projectDiv.dataset.id) {
                fetch(`/api/projects/active/${projectDiv.dataset.id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } })
                    .then(() => refreshDashboard());
            }
        });

        // ---------- Initialization ----------
        async function init() {
            await loadUserProfile();
            await refreshDashboard();
            connectWebSocket();
            setInterval(refreshDashboard, 10000);
            addChatMessage('bot', '👋 Welcome to JAOLA Mission Console. I am your autonomous software team. Describe your mission.', 'JAOLA');
        }
        init();
    </script>
</body>
</html>
