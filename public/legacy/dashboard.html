<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA OS | Autonomous Software Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-completed { background-color: #10b981; color: white; }
        .status-current { background-color: #3b82f6; color: white; }
        .status-pending { background-color: #9ca3af; color: white; }
        .agent-card { transition: all 0.2s; border-right: 4px solid transparent; }
        .agent-card.working { border-right-color: #3b82f6; background-color: #eff6ff; }
        .tree, .tree ul { list-style: none; margin: 0; padding: 0 0 0 1.5rem; }
        .tree li { position: relative; margin: 0.25rem 0; }
        .tree li::before { content: '📁'; position: absolute; right: -1.2rem; top: 0; }
        .file::before { content: '📄' !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-7xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold">🤖 JAOLA OS</h1>
                <p class="text-sm text-gray-500">Autonomous Software Team</p>
            </div>
            <div class="bg-white rounded shadow p-2 text-sm">
                <span class="font-bold">Project: Travel Platform</span>
                <div class="w-32 h-2 bg-gray-200 rounded mt-1"><div class="w-[82%] h-full bg-green-500 rounded"></div></div>
                <div class="flex gap-2 mt-1">Build: ✅ Deploy: ✅</div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-white rounded shadow p-3 text-center"><div class="text-2xl font-bold" id="kpiProjects">3</div><div>المشاريع</div></div>
            <div class="bg-white rounded shadow p-3 text-center"><div class="text-2xl font-bold" id="kpiTasks">0</div><div>المهام</div></div>
            <div class="bg-white rounded shadow p-3 text-center"><div class="text-2xl font-bold text-green-600" id="kpiDeploySuccess">0%</div><div>نشر ناجح</div></div>
            <div class="bg-white rounded shadow p-3 text-center"><div class="text-2xl font-bold text-blue-600" id="kpiAutoFix">0%</div><div>AutoFix</div></div>
            <div class="bg-white rounded shadow p-3 text-center"><div class="text-2xl font-bold" id="kpiAvgTime">0s</div><div>متوسط البناء</div></div>
        </div>

        <!-- AI Team Center -->
        <div class="bg-white rounded shadow p-4 mb-6">
            <h2 class="text-xl font-bold mb-3">🤖 AI Team Center</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="agentsGrid"></div>
        </div>

        <!-- Lifecycle Pipeline -->
        <div class="bg-white rounded shadow p-4 mb-6">
            <h2 class="text-xl font-bold mb-3">🔄 دورة التطوير (Software Lifecycle)</h2>
            <div id="workflowPipeline" class="flex flex-wrap justify-between items-center"></div>
        </div>

        <!-- Decision Center + Architecture Explorer (Grid) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded shadow p-4">
                <h2 class="text-xl font-bold mb-3">🧠 Decision Intelligence Center</h2>
                <div id="decisionsList" class="h-80 overflow-y-auto space-y-2 text-sm"></div>
            </div>
            <div class="bg-white rounded shadow p-4">
                <h2 class="text-xl font-bold mb-3">🗺️ Project Architecture Explorer</h2>
                <div id="architectureTree" class="h-80 overflow-y-auto text-sm font-mono"></div>
            </div>
        </div>

        <!-- Analytics (Quick Stats) -->
        <div class="bg-white rounded shadow p-4 mb-6">
            <h2 class="text-xl font-bold mb-3">📈 Analytics Center</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center" id="analyticsCards"></div>
        </div>
    </div>

    <script>
        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onmessage = () => refreshAll();
            ws.onclose = () => setTimeout(connectWS, 3000);
        }
        connectWS();

        async function refreshAll() {
            await fetchKPIs();
            await fetchAgentsStatus();
            await fetchWorkflow();
            await fetchDecisions();
            await fetchArchitectureTree();
        }

        async function fetchKPIs() {
            const res = await fetch('/api/kpis');
            const kpis = await res.json();
            document.getElementById('kpiTasks').innerText = kpis.totalTasks || 0;
            document.getElementById('kpiDeploySuccess').innerText = (kpis.deploySuccessRate || 0) + '%';
            document.getElementById('kpiAutoFix').innerText = (kpis.autoFixRate || 0) + '%';
            document.getElementById('kpiAvgTime').innerText = '2.3s'; // مثال
        }

        async function fetchAgentsStatus() {
            const res = await fetch('/api/agents/health');
            const agents = await res.json();
            const container = document.getElementById('agentsGrid');
            const agentIcons = { Planner: '📋', Coder: '💻', Reviewer: '🔍', QA: '🧪', Git: '🐙', Architect: '🧠' };
            container.innerHTML = Object.entries(agents).map(([name, info]) => `
                <div class="agent-card ${info.status === 'healthy' ? 'border-green-500' : 'border-yellow-500'} bg-gray-50 p-3 rounded shadow">
                    <div class="flex justify-between"><span class="font-bold">${agentIcons[name] || '🤖'} ${name}</span><span class="text-xs ${info.status === 'healthy' ? 'text-green-600' : 'text-yellow-600'}">${info.status}</span></div>
                    <div class="text-xs text-gray-500">الدقة: ${info.successRate || 100}%</div>
                    <div class="text-xs">المهام: ${info.total || 0}</div>
                </div>
            `).join('');
        }

        async function fetchWorkflow() {
            const res = await fetch('/api/workflow/status/live');
            const steps = await res.json();
            const container = document.getElementById('workflowPipeline');
            container.innerHTML = steps.map((step, i) => `
                <div class="text-center">
                    <div class="font-bold text-sm">${step.name}</div>
                    <div class="w-16 h-1 mx-auto mt-1 rounded ${step.status === 'completed' ? 'bg-green-500' : step.status === 'current' ? 'bg-blue-500' : 'bg-gray-300'}"></div>
                    ${i < steps.length-1 ? '<div class="inline-block text-gray-400 mx-1">→</div>' : ''}
                </div>
            `).join('');
        }

        async function fetchDecisions() {
            const res = await fetch('/api/decisions/center');
            const decisions = await res.json();
            const container = document.getElementById('decisionsList');
            if (!decisions.length) { container.innerHTML = '<div class="text-gray-500">لا توجد قرارات بعد</div>'; return; }
            container.innerHTML = decisions.map(d => `
                <div class="border-r-4 border-blue-500 bg-gray-50 p-2 rounded">
                    <div class="font-bold">${d.agent || 'System'}</div>
                    <div class="text-sm">${d.decision}</div>
                    <div class="text-xs text-gray-400">${new Date(d.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function fetchArchitectureTree() {
            const res = await fetch('/api/architecture/tree');
            const tree = await res.json();
            const container = document.getElementById('architectureTree');
            function renderTree(obj, level = 0) {
                let html = '<ul class="tree">';
                for (const [key, val] of Object.entries(obj)) {
                    if (key === '__files') {
                        val.forEach(file => html += `<li class="file">📄 ${file}</li>`);
                    } else if (typeof val === 'object') {
                        html += `<li>📁 ${key}${renderTree(val, level+1)}</li>`;
                    } else {
                        html += `<li>📄 ${key}</li>`;
                    }
                }
                html += '</ul>';
                return html;
            }
            container.innerHTML = renderTree(tree);
        }

        setInterval(refreshAll, 8000);
        refreshAll();
    </script>
</body>
</html>
