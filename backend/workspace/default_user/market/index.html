<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر الملابس والأحذية والإكسسوارات</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#">الرئيسية</a></li>
        <li><a href="#">الملابس</a></li>
        <li><a href="#">الأحذية</a></li>
        <li><a href="#">الإكسسوارات</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <h1>أحدث المنتجات</h1>
      <div class="products">
        <div class="product">
          <img src="product1.jpg" alt="">
          <h2>ملابس نسائية</h2>
          <p>السعر: 100 ريال</p>
        </div>
        <div class="product">
          <img src="product2.jpg" alt="">
          <h2>أحذية رجالية</h2>
          <p>السعر: 200 ريال</p>
        </div>
        <div class="product">
          <img src="product3.jpg" alt="">
          <h2>إكسسوارات</h2>
          <p>السعر: 50 ريال</p>
        </div>
      </div>
    </section>
  </main>
  <footer>
    <p>جميع الحقوق محفوظة لمتجر الملابس والأحذية والإكسسوارات</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
