<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA OS | Agents Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', 'Tajawal', sans-serif; }
        body { background: #09090B; color: #e5e7eb; }
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #27272A;
            border-radius: 1.5rem;
        }
        .glass-card {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .glass-card:hover {
            border-left-color: #3b82f6;
            transform: translateY(-2px);
            background: rgba(59,130,246,0.05);
        }
        .status-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 9999px; }
        .status-online { background: #10b98120; color: #10b981; }
        .status-busy { background: #f59e0b20; color: #f59e0b; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 flex-shrink-0 bg-[#09090B] border-l border-[#27272A] flex flex-col p-5 overflow-y-auto">
            <div class="mb-8"><h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">JAOLA OS</h1><p class="text-xs text-gray-500">Autonomous Software Engineering Platform</p></div>
            <div class="mb-6"><div class="flex justify-between items-center mb-2"><h3 class="text-xs font-semibold text-gray-400 uppercase">PROJECTS</h3><button id="newProjectBtn" class="text-xs text-blue-400"><i class="fas fa-plus"></i> New</button></div><div id="projectsList" class="space-y-1 max-h-48 overflow-y-auto"></div></div>
            <nav class="mb-6"><h3 class="text-xs font-semibold text-gray-400 uppercase mb-2">MENU</h3><div class="space-y-1">
                <a href="/mission-control-v2.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-tachometer-alt w-5"></i> Mission Control</a>
                <a href="/agents.html" class="flex items-center gap-3 p-2 rounded-lg bg-blue-900/30 text-blue-400"><i class="fas fa-microchip w-5"></i> Agents Center</a>
                <a href="/architecture.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-project-diagram w-5"></i> Architecture</a>
                <a href="/workflow.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-chart-line w-5"></i> Workflow</a>
                <a href="/projects.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-folder-open w-5"></i> Projects</a>
                <a href="#" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-brain w-5"></i> Decisions</a>
                <a href="#" class="flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800"><i class="fas fa-cog w-5"></i> Settings</a>
            </div></nav>
            <div class="mt-auto pt-4 border-t border-[#27272A] flex justify-between items-center"><div class="flex items-center gap-2"><i class="fas fa-user-circle text-2xl text-gray-400"></i><div><div id="usernameDisplay" class="text-sm font-medium">Developer</div><div class="text-xs text-gray-500">Pro Plan</div></div></div><button id="logoutBtn" class="text-xs text-gray-500 hover:text-white"><i class="fas fa-sign-out-alt"></i></button></div>
        </aside>
        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold mb-2">🤖 AI Team Center</h1>
            <p class="text-gray-400 mb-6">Real‑time status and performance of your autonomous engineering team</p>
            <div id="agentsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>
    <script>
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/user.html';
        async function fetchAgentsHealth() { const res = await fetch('/api/agents/health', { headers: { Authorization: `Bearer ${token}` } }); return res.ok ? await res.json() : {}; }
        async function fetchProjects() { const res = await fetch('/api/projects', { headers: { Authorization: `Bearer ${token}` } }); return res.ok ? await res.json() : []; }
        async function fetchActiveProject() { const res = await fetch('/api/projects/active', { headers: { Authorization: `Bearer ${token}` } }); return res.ok ? await res.json() : null; }
        const agentIcons = { Architect: '🧠', Planner: '📋', Coder: '💻', Reviewer: '🔍', QA: '🧪', Git: '🐙', DevOps: '🚀', Memory: '🧠' };
        const agentTitles = { Architect: 'System Design Agent', Planner: 'Task Planning Agent', Coder: 'Code Generation Agent', Reviewer: 'Code Review Agent', QA: 'Quality Assurance Agent', Git: 'Version Control Agent', DevOps: 'Deployment Agent', Memory: 'Long‑term Memory Agent' };
        async function renderAgents() {
            const agents = await fetchAgentsHealth();
            const container = document.getElementById('agentsContainer');
            if (!Object.keys(agents).length) { container.innerHTML = '<div class="glass p-5 text-center">No agents data</div>'; return; }
            container.innerHTML = Object.entries(agents).map(([name, info]) => {
                const online = info.status === 'healthy' ? 'Online' : (info.status === 'running' ? 'Busy' : 'Offline');
                const statusColor = info.status === 'healthy' ? 'text-green-400' : (info.status === 'running' ? 'text-yellow-400' : 'text-gray-500');
                const barColor = info.status === 'healthy' ? 'bg-green-500' : (info.status === 'running' ? 'bg-yellow-500' : 'bg-gray-500');
                return `
                    <div class="glass glass-card rounded-2xl p-5">
                        <div class="flex justify-between items-center">
                            <div><h3 class="font-bold text-lg">${agentIcons[name] || '🤖'} ${name}</h3><p class="text-zinc-400 text-sm">${agentTitles[name] || 'AI Agent'}</p></div>
                            <div class="${statusColor}">● ${online}</div>
                        </div>
                        <div class="mt-4"><div class="text-xs text-zinc-500">Current Task</div><div class="mt-1">${info.action || 'Idle'}</div></div>
                        <div class="mt-4"><div class="flex justify-between text-sm"><span>Health</span><span>${info.successRate || 100}%</span></div>
                        <div class="w-full bg-zinc-800 h-2 rounded-full mt-2"><div class="${barColor} h-2 rounded-full" style="width:${info.successRate || 100}%"></div></div></div>
                        <div class="mt-3 text-xs text-gray-500">Tasks: ${info.total || 0}</div>
                    </div>
                `;
            }).join('');
        }
        async function renderSidebarProjects() { const projects = await fetchProjects(); const active = await fetchActiveProject(); const container = document.getElementById('projectsList'); container.innerHTML = projects.map(p => `<div class="flex justify-between p-2 rounded-lg cursor-pointer hover:bg-zinc-800/50 ${p.id === active?.id ? 'bg-blue-900/30 border-r border-blue-500' : ''}" data-id="${p.id}"><span>${p.name}</span>${p.id === active?.id ? '<i class="fas fa-check-circle text-blue-500 text-xs"></i>' : ''}</div>`).join(''); document.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', async (e) => { const id = el.dataset.id; await fetch(`/api/projects/active/${id}`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } }); renderSidebarProjects(); renderAgents(); })); }
        async function loadUser() { try { const user = await fetch('/api/user/profile', { headers: { Authorization: `Bearer ${token}` } }).then(r=>r.json()); document.getElementById('usernameDisplay').innerText = user.username || 'Developer'; } catch(e){} }
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); window.location.href = '/user.html'; };
        document.getElementById('newProjectBtn').onclick = async () => { const name = prompt('Project name:'); const path = prompt('Absolute path:'); if(name&&path){ await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify({ name, path }) }); renderSidebarProjects(); } };
        loadUser(); renderSidebarProjects(); renderAgents(); setInterval(renderAgents, 10000);
    </script>
</body>
</html>
