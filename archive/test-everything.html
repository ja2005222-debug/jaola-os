<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="p-10 border border-emerald-500 rounded-xl">
                    <h1 className="text-4xl font-bold text-emerald-400">JAOLA OS يعمل!</h1>
                    <p className="mt-4">إذا رأيت هذه الرسالة، فالمتصفح و React يعملان بشكل مثالي.</p>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
