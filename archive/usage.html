<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA OS | Usage Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">📊 مراقبة استخدام وكلاء الذكاء الاصطناعي</h1>
        <div id="stats" class="space-y-4"></div>
        <button onclick="refreshStats()" class="mt-4 bg-blue-600 px-4 py-2 rounded">تحديث</button>
        <button onclick="resetStats()" class="mt-4 bg-red-600 px-4 py-2 rounded">إعادة ضبط</button>
    </div>
    <script>
        async function refreshStats() {
            const res = await fetch('/api/usage');
            const stats = await res.json();
            const container = document.getElementById('stats');
            container.innerHTML = Object.entries(stats).map(([provider, data]) => `
                <div class="bg-gray-800 p-4 rounded-lg">
                    <div class="font-bold text-lg">${provider}</div>
                    <div>🔄 عدد الطلبات: ${data.requests}</div>
                    <div>🎫 الرموز المستخدمة: ${data.tokens.toLocaleString()}</div>
                </div>
            `).join('');
        }
        async function resetStats() {
            await fetch('/api/usage/reset', { method: 'POST' });
            refreshStats();
        }
        refreshStats();
        setInterval(refreshStats, 5000);
    </script>
</body>
</html>
