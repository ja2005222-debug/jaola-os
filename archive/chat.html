<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>JAOLA Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">JAOLA AI</h1>
        <div id="messages" class="h-96 overflow-y-auto border border-gray-700 rounded p-3 mb-3 bg-gray-800"></div>
        <div class="flex gap-2">
            <input type="text" id="input" class="flex-1 bg-gray-700 rounded px-3 py-2 focus:outline-none">
            <button id="send" class="bg-indigo-600 px-4 py-2 rounded">إرسال</button>
        </div>
        <button id="logout" class="mt-4 text-red-400 text-sm">تسجيل الخروج</button>
    </div>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/user.html';
        let sessionId = localStorage.getItem('sessionId') || crypto.randomUUID();
        localStorage.setItem('sessionId', sessionId);
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `my-2 ${role === 'user' ? 'text-right' : 'text-left'}`;
            div.innerHTML = `<span class="inline-block px-3 py-1 rounded ${role === 'user' ? 'bg-indigo-600' : 'bg-gray-700'}">${escapeHtml(text)}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        async function send() {
            const msg = input.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            input.value = '';
            sendBtn.disabled = true;
            try {
                const res = await fetch('/api/user/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: msg, sessionId })
                });
                if (res.status === 401) throw new Error('Unauthorized');
                const data = await res.json();
                addMessage('assistant', data.reply || 'تم التنفيذ.');
            } catch (err) {
                addMessage('assistant', 'خطأ في الاتصال بالخادم.');
            }
            sendBtn.disabled = false;
        }
        sendBtn.onclick = send;
        input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
        document.getElementById('logout').onclick = () => { localStorage.clear(); window.location.href = '/user.html'; };
        addMessage('assistant', 'مرحباً! أنا JAOLA AI. كيف أساعدك؟');
    </script>
</body>
</html>
