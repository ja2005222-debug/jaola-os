<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA | منصة التطوير الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-running { background-color: #dbeafe; color: #1e40af; }
        .status-completed { background-color: #d1fae5; color: #065f46; }
        .status-failed { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-5xl">
        <div id="authScreen" class="bg-white rounded shadow p-6">
            <h1 class="text-3xl font-bold mb-6 text-center">🤖 JAOLA AI Developer Platform</h1>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" class="border p-2 w-full rounded mb-2">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="border p-2 w-full rounded mb-2">
            <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">دخول</button>
            <div class="text-center mt-2"><button onclick="showRegister()" class="text-blue-600">إنشاء حساب جديد</button></div>
        </div>

        <div id="registerScreen" class="bg-white rounded shadow p-6 hidden">
            <h1 class="text-3xl font-bold mb-6 text-center">إنشاء حساب</h1>
            <input type="text" id="regUsername" placeholder="اسم المستخدم" class="border p-2 w-full rounded mb-2">
            <input type="password" id="regPassword" placeholder="كلمة المرور" class="border p-2 w-full rounded mb-2">
            <button onclick="register()" class="bg-green-600 text-white w-full py-2 rounded">تسجيل</button>
            <div class="text-center mt-2"><button onclick="showLogin()" class="text-blue-600">عودة</button></div>
        </div>

        <div id="userPanel" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold">👋 مرحباً، <span id="usernameDisplay"></span></h1>
                <button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">تسجيل خروج</button>
            </div>

            <div class="bg-white rounded shadow p-4 mb-6">
                <h2 class="text-xl font-bold mb-2">✨ اطلب تطويراً جديداً</h2>
                <textarea id="newRequest" rows="2" class="border p-2 w-full rounded mb-2" placeholder="مثال: أضف صفحة تسجيل دخول مع نموذج بريد وكلمة مرور"></textarea>
                <button onclick="submitRequest()" class="bg-blue-600 text-white px-4 py-2 rounded">إرسال الطلب</button>
                <div id="requestStatus" class="mt-2 text-sm text-gray-500"></div>
            </div>

            <div class="bg-white rounded shadow p-4">
                <h2 class="text-xl font-bold mb-2">📋 طلباتي السابقة</h2>
                <div id="requestsList" class="space-y-3 max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onmessage = () => loadRequests(); // تحديث عند أي تغيير
            ws.onclose = () => setTimeout(connectWS, 3000);
        }
        connectWS();

        if (token) showPanel();

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                showPanel();
            } else alert('فشل تسجيل الدخول');
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) { alert('تم التسجيل بنجاح، سجل الدخول'); showLogin(); } else alert('فشل التسجيل');
        }

        function showRegister() { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('registerScreen').classList.remove('hidden'); }
        function showLogin() { document.getElementById('registerScreen').classList.add('hidden'); document.getElementById('authScreen').classList.remove('hidden'); }
        function logout() { localStorage.removeItem('token'); location.reload(); }

        async function showPanel() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('registerScreen').classList.add('hidden');
            document.getElementById('userPanel').classList.remove('hidden');
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('usernameDisplay').innerText = payload.username;
            await loadRequests();
            setInterval(loadRequests, 5000);
        }

        async function loadRequests() {
            const res = await fetch('/api/user/plans', { headers: { 'Authorization': `Bearer ${token}` } });
            const plans = await res.json();
            const container = document.getElementById('requestsList');
            if (!plans.length) { container.innerHTML = '<div class="text-gray-500">لا توجد طلبات سابقة</div>'; return; }
            let html = '';
            for (const plan of plans) {
                html += `
                    <div class="border rounded p-3 bg-white">
                        <div class="font-bold text-lg">🎯 ${escapeHtml(plan.goal)}</div>
                        <div class="text-sm text-gray-500">${new Date(plan.createdAt).toLocaleString()}</div>
                        <button onclick="fetchPlanDetails('${plan.id}', this)" class="mt-2 text-blue-600 text-sm">▼ تفاصيل</button>
                        <div id="plan-details-${plan.id}" class="hidden mt-2 text-sm space-y-1"></div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function fetchPlanDetails(planId, btn) {
            const detailsDiv = document.getElementById(`plan-details-${planId}`);
            if (!detailsDiv.classList.contains('hidden')) {
                detailsDiv.classList.add('hidden');
                btn.innerText = '▼ تفاصيل';
                return;
            }
            btn.innerText = '▲ إخفاء';
            const res = await fetch(`/api/user/plan/${planId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!data.plan) { detailsDiv.innerHTML = '<div class="text-red-600">خطأ في التحميل</div>'; return; }
            let tasksHtml = '';
            for (const task of data.tasks) {
                let statusClass = '';
                if (task.status === 'completed') statusClass = 'status-completed';
                else if (task.status === 'running') statusClass = 'status-running';
                else if (task.status === 'failed') statusClass = 'status-failed';
                else statusClass = 'status-pending';
                tasksHtml += `
                    <div class="border rounded p-2 mb-2">
                        <div class="flex justify-between">
                            <span class="font-mono">${task.action}</span>
                            <span class="px-2 py-0.5 rounded text-xs ${statusClass}">${task.status}</span>
                        </div>
                        ${task.result ? `<div class="text-xs text-gray-600 mt-1">النتيجة: ${escapeHtml(typeof task.result === 'string' ? task.result.substring(0,200) : JSON.stringify(task.result).substring(0,200))}</div>` : ''}
                        ${task.error ? `<div class="text-red-600 text-xs mt-1">خطأ: ${escapeHtml(task.error)}</div>` : ''}
                    </div>
                `;
            }
            detailsDiv.innerHTML = tasksHtml;
            detailsDiv.classList.remove('hidden');
        }

        async function submitRequest() {
            const message = document.getElementById('newRequest').value;
            if (!message) return alert('اكتب طلبك');
            const statusDiv = document.getElementById('requestStatus');
            statusDiv.innerText = '⏳ جاري إرسال الطلب...';
            const res = await fetch('/api/user/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ message })
            });
            if (res.ok) {
                const data = await res.json();
                statusDiv.innerText = `✅ تم استلام الطلب (رقم الخطة: ${data.planId})، سيتم تنفيذه قريباً.`;
                document.getElementById('newRequest').value = '';
                loadRequests();
            } else {
                const err = await res.json();
                statusDiv.innerText = `❌ فشل الإرسال: ${err.error || 'خطأ غير معروف'}`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        if (token) showPanel();
    </script>
</body>
</html>
