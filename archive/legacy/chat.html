<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAOLA AI | شات المطور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
        }
        .chat-container {
            height: calc(100vh - 200px);
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }
        .user-bubble {
            background-color: #3b82f6;
            color: white;
            border-radius: 1.5rem 1.5rem 0.25rem 1.5rem;
        }
        .bot-bubble {
            background-color: #1f2937;
            color: #f3f4f6;
            border-radius: 1.5rem 1.5rem 1.5rem 0.25rem;
        }
        .task-details {
            background: #0f172a;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }
        .retry-btn, .autofix-btn {
            transition: all 0.2s;
        }
        .retry-btn:hover, .autofix-btn:hover {
            transform: scale(1.02);
        }
        .typing-indicator span {
            height: 8px;
            width: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 10px; }
        pre { margin: 0; }
        .status-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
            background: #374151;
            color: #e5e7eb;
        }
        .status-running { background: #3b82f6; }
        .status-completed { background: #10b981; }
        .status-failed { background: #ef4444; }
        .status-pending { background: #f59e0b; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fab fa-robot text-3xl text-white"></i>
                <div>
                    <h1 class="text-2xl font-bold text-white">JAOLA AI</h1>
                    <p class="text-indigo-200 text-sm">فريق برمجي ذاتي التشغيل</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="themeToggle" class="bg-white/20 text-white p-2 rounded-full hover:bg-white/30 transition"><i class="fas fa-moon"></i></button>
                <button id="clearChat" class="bg-white/20 text-white p-2 rounded-full hover:bg-white/30 transition"><i class="fas fa-trash-alt"></i></button>
                <button id="logoutBtn" class="bg-white/20 text-white p-2 rounded-full hover:bg-white/30 transition"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- Auth Screens -->
        <div id="authScreen" class="p-8 text-center">
            <div class="max-w-md mx-auto bg-gray-50 rounded-xl p-6 shadow">
                <i class="fas fa-user-circle text-6xl text-indigo-500 mb-4"></i>
                <h2 class="text-2xl font-bold mb-4">مرحباً بعودتك</h2>
                <input type="text" id="loginUsername" placeholder="اسم المستخدم" class="w-full border p-3 rounded-lg mb-3">
                <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full border p-3 rounded-lg mb-3">
                <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition">دخول</button>
                <p class="mt-4 text-gray-500">ليس لديك حساب؟ <button id="showRegister" class="text-indigo-600">إنشاء حساب</button></p>
            </div>
        </div>

        <div id="registerScreen" class="p-8 text-center hidden">
            <div class="max-w-md mx-auto bg-gray-50 rounded-xl p-6 shadow">
                <i class="fas fa-user-plus text-6xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold mb-4">حساب جديد</h2>
                <input type="text" id="regUsername" placeholder="اسم المستخدم" class="w-full border p-3 rounded-lg mb-3">
                <input type="password" id="regPassword" placeholder="كلمة المرور" class="w-full border p-3 rounded-lg mb-3">
                <button id="registerBtn" class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 transition">تسجيل</button>
                <p class="mt-4"><button id="showLogin" class="text-indigo-600">عودة لتسجيل الدخول</button></p>
            </div>
        </div>

        <!-- Main Chat Screen -->
        <div id="chatScreen" class="hidden flex flex-col h-[calc(100vh-80px)]">
            <div id="chatMessages" class="chat-container flex-1 p-4 space-y-4 bg-gray-50"></div>
            <div id="typingIndicator" class="hidden px-4 py-2">
                <div class="typing-indicator flex gap-1">
                    <span></span><span></span><span></span>
                    <span class="text-gray-500 text-sm mr-2">يكتب...</span>
                </div>
            </div>
            <div class="border-t p-4 bg-white">
                <div class="flex gap-2 mb-2 flex-wrap">
                    <button data-command="اظهر الملفات" class="quick-cmd bg-gray-200 hover:bg-gray-300 text-sm px-3 py-1 rounded-full transition">📁 الملفات</button>
                    <button data-command="حالة المشروع" class="quick-cmd bg-gray-200 hover:bg-gray-300 text-sm px-3 py-1 rounded-full transition">📊 الحالة</button>
                    <button data-command="بني المشروع" class="quick-cmd bg-gray-200 hover:bg-gray-300 text-sm px-3 py-1 rounded-full transition">🔨 بناء</button>
                    <button data-command="شغل الموقع" class="quick-cmd bg-gray-200 hover:bg-gray-300 text-sm px-3 py-1 rounded-full transition">▶️ تشغيل</button>
                    <button data-command="انشر الموقع" class="quick-cmd bg-gray-200 hover:bg-gray-300 text-sm px-3 py-1 rounded-full transition">🚀 نشر</button>
                </div>
                <div class="flex gap-2">
                    <textarea id="messageInput" rows="1" class="flex-1 border rounded-lg p-3 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="اكثر من مجرد أمر... اسأل عن أي شيء متعلق بتطوير موقعك"></textarea>
                    <button id="sendBtn" class="bg-indigo-600 text-white px-6 rounded-lg hover:bg-indigo-700 transition"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="text-xs text-gray-400 mt-2 text-center">JAOLA AI – فريق تطوير ذكي تحت أمرك</div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let ws = null;
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        let pendingTasks = new Map(); // store task details by id

        // DOM elements
        const authScreen = document.getElementById('authScreen');
        const registerScreen = document.getElementById('registerScreen');
        const chatScreen = document.getElementById('chatScreen');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Helper: add message to chat and localStorage
        function addMessage(role, content, extra = {}) {
            const message = { role, content, timestamp: new Date().toISOString(), ...extra };
            chatHistory.push(message);
            if (chatHistory.length > 200) chatHistory = chatHistory.slice(-200);
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            renderMessage(message);
        }

        function renderMessage(msg) {
            const div = document.createElement('div');
            div.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-4 animate-fade-in`;
            const bubbleClass = msg.role === 'user' ? 'user-bubble' : 'bot-bubble';
            const icon = msg.role === 'user' ? '<i class="fas fa-user-circle text-blue-500 text-xl ml-2"></i>' : '<i class="fas fa-robot text-purple-500 text-xl ml-2"></i>';
            let formattedContent = msg.content;
            if (msg.role === 'bot') formattedContent = marked.parse(msg.content);
            let taskDetailsHtml = '';
            if (msg.taskDetails) {
                taskDetailsHtml = `
                    <div class="task-details mt-2 p-2 text-xs">
                        <details>
                            <summary class="cursor-pointer text-gray-400 hover:text-white">📋 تفاصيل المهمة</summary>
                            <pre class="mt-2 overflow-x-auto text-gray-300">${JSON.stringify(msg.taskDetails, null, 2)}</pre>
                        </details>
                    </div>`;
            }
            let actionButtons = '';
            if (msg.taskId && msg.taskStatus === 'failed') {
                actionButtons = `
                    <div class="flex gap-2 mt-2">
                        <button class="retry-btn bg-yellow-600 hover:bg-yellow-700 text-white text-xs px-2 py-1 rounded" data-task-id="${msg.taskId}"><i class="fas fa-redo-alt ml-1"></i>إعادة المحاولة</button>
                        <button class="autofix-btn bg-blue-600 hover:bg-blue-700 text-white text-xs px-2 py-1 rounded" data-task-id="${msg.taskId}"><i class="fas fa-wrench ml-1"></i>إصلاح تلقائي</button>
                    </div>`;
            }
            div.innerHTML = `
                <div class="message-bubble ${bubbleClass} p-3 shadow">
                    <div class="flex items-center gap-2 mb-1">
                        ${icon}
                        <span class="text-xs opacity-70">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                        ${msg.agent ? `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded-full">${msg.agent}</span>` : ''}
                        ${msg.taskStatus ? `<span class="status-badge ${getStatusClass(msg.taskStatus)} ml-2">${msg.taskStatus}</span>` : ''}
                    </div>
                    <div class="prose prose-sm max-w-none ${msg.role === 'user' ? 'text-white' : ''}">${formattedContent}</div>
                    ${taskDetailsHtml}
                    ${actionButtons}
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            // attach event listeners to buttons after render
            div.querySelectorAll('.retry-btn').forEach(btn => {
                btn.onclick = () => retryTask(btn.dataset.taskId);
            });
            div.querySelectorAll('.autofix-btn').forEach(btn => {
                btn.onclick = () => autoFixTask(btn.dataset.taskId);
            });
        }

        function getStatusClass(status) {
            switch(status) {
                case 'running': return 'status-running';
                case 'completed': return 'status-completed';
                case 'failed': return 'status-failed';
                default: return 'status-pending';
            }
        }

        function loadChatHistory() {
            chatMessages.innerHTML = '';
            chatHistory.forEach(msg => renderMessage(msg));
        }

        function showTyping() { typingIndicator.classList.remove('hidden'); chatMessages.scrollTop = chatMessages.scrollHeight; }
        function hideTyping() { typingIndicator.classList.add('hidden'); }

        // API calls
        async function sendMessage(text) {
            if (!text.trim()) return;
            addMessage('user', text);
            messageInput.value = '';
            showTyping();
            try {
                const res = await fetch('/api/user/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                hideTyping();
                if (res.ok) {
                    addMessage('bot', `✅ **تم استلام طلبك**\n\nرقم الخطة: \`${data.planId}\`\nعدد المهام: ${data.tasksCount}\nسيتم تنفيذ المهام في الخلفية.`);
                } else {
                    addMessage('bot', `❌ **خطأ:** ${data.error || 'فشل إرسال الطلب'}`);
                }
            } catch (err) {
                hideTyping();
                addMessage('bot', `❌ **فشل الاتصال:** ${err.message}`);
            }
        }

        async function retryTask(taskId) {
            showTyping();
            try {
                const res = await fetch(`/api/tasks/${taskId}/retry`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                hideTyping();
                if (res.ok) {
                    addMessage('bot', `🔄 **إعادة المحاولة**\nتم إعادة تنفيذ المهمة ${taskId}.`);
                } else {
                    addMessage('bot', `❌ فشل إعادة المحاولة: ${data.error}`);
                }
            } catch (err) {
                hideTyping();
                addMessage('bot', `❌ خطأ: ${err.message}`);
            }
        }

        async function autoFixTask(taskId) {
            showTyping();
            try {
                const res = await fetch(`/api/tasks/${taskId}/autofix`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                hideTyping();
                if (res.ok) {
                    addMessage('bot', `🔧 **الإصلاح التلقائي**\nتم تطبيق الإصلاح وإعادة التنفيذ. نتيجة: ${data.result || 'تم الإصلاح بنجاح'}`);
                } else {
                    addMessage('bot', `❌ فشل الإصلاح التلقائي: ${data.error}`);
                }
            } catch (err) {
                hideTyping();
                addMessage('bot', `❌ خطأ: ${err.message}`);
            }
        }

        // WebSocket: receive real-time updates
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'task_update') {
                    // Store task details if available
                    let taskDetails = null;
                    if (data.task) taskDetails = data.task;
                    let content = '';
                    if (data.status === 'pending') content = `⏳ المهمة \`${data.taskId}\` في الانتظار`;
                    else if (data.status === 'running') content = `⚙️ المهمة \`${data.taskId}\` قيد التنفيذ`;
                    else if (data.status === 'completed') content = `✅ اكتملت المهمة \`${data.taskId}\``;
                    else if (data.status === 'failed') {
                        content = `❌ فشلت المهمة \`${data.taskId}\``;
                        if (data.error) content += `\n\n**السبب:** ${data.error}`;
                    }
                    addMessage('bot', content, { taskId: data.taskId, taskStatus: data.status, taskDetails });
                }
                if (data.type === 'plan_update') {
                    addMessage('bot', `📋 **خطة جديدة**\nالهدف: ${data.goal}`);
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        // Auth functions
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                localStorage.setItem('token', token);
                showChatScreen();
                connectWebSocket();
            } else alert('فشل تسجيل الدخول');
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) {
                alert('تم التسجيل بنجاح، سجل الدخول');
                showLoginScreen();
            } else alert('فشل التسجيل');
        }

        function showChatScreen() {
            authScreen.classList.add('hidden');
            registerScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            loadChatHistory();
        }
        function showLoginScreen() {
            authScreen.classList.remove('hidden');
            registerScreen.classList.add('hidden');
            chatScreen.classList.add('hidden');
        }
        function showRegisterScreen() {
            authScreen.classList.add('hidden');
            registerScreen.classList.remove('hidden');
            chatScreen.classList.add('hidden');
        }
        function logout() {
            localStorage.removeItem('token');
            token = null;
            showLoginScreen();
        }
        function clearChatHistory() {
            chatHistory = [];
            localStorage.setItem('chatHistory', '[]');
            chatMessages.innerHTML = '';
            addMessage('bot', '✨ تم مسح سجل المحادثة. يمكنك البدء من جديد.');
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Event listeners
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('showRegister').onclick = showRegisterScreen;
        document.getElementById('showLogin').onclick = showLoginScreen;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('clearChat').onclick = clearChatHistory;
        document.getElementById('themeToggle').onclick = toggleTheme;
        sendBtn.onclick = () => sendMessage(messageInput.value);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(messageInput.value); }
        });
        document.querySelectorAll('.quick-cmd').forEach(btn => {
            btn.onclick = () => sendMessage(btn.getAttribute('data-command'));
        });

        if (token) { showChatScreen(); connectWebSocket(); }
        else showLoginScreen();
    </script>
</body>
</html>
