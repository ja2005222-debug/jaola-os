<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>اختبار إرسال الطلب</title></head>
<body>
  <h1>اختبار إرسال الطلب</h1>
  <input type="text" id="msg" placeholder="الطلب" style="width:300px">
  <button onclick="send()">إرسال</button>
  <pre id="output" style="margin-top:20px; background:#f0f0f0; padding:10px;"></pre>
  <script>
    let token = localStorage.getItem('token');
    if (!token) {
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: 'test', password: '123' })
      })
      .then(r => r.json())
      .then(data => {
        if (data.token) {
          localStorage.setItem('token', data.token);
          token = data.token;
          document.getElementById('output').innerText = '✅ تم التسجيل تلقائياً (مستخدم test). أرسل طلبك.';
        } else {
          document.getElementById('output').innerText = '❌ فشل تسجيل الدخول: ' + JSON.stringify(data);
        }
      })
      .catch(err => {
        document.getElementById('output').innerText = '❌ خطأ في الاتصال: ' + err.message;
      });
    } else {
      document.getElementById('output').innerText = '🔑 Token موجود، أرسل طلبك.';
    }

    async function send() {
      const msg = document.getElementById('msg').value;
      if (!msg) return alert('اكتب رسالة');
      document.getElementById('output').innerText = '⏳ جاري الإرسال...';
      try {
        const res = await fetch('/api/user/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        document.getElementById('output').innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('output').innerText = '❌ خطأ: ' + err.message;
      }
    }
  </script>
</body>
</html>
