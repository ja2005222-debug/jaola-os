<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- استدعاء معزز ومباشر لأحدث نسخ المكتبات والخطوط لتفادي مشاكل الـ CORS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Tajawal:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Tajawal', 'Cairo', sans-serif; scroll-behavior: smooth; }
    </style>
    
    <title>نشاط البراكين</title>
</head>
<body class="bg-[#080b11] text-slate-100 min-h-screen flex flex-col justify-center items-center p-6 selection:bg-cyan-500 selection:text-slate-900">
    <!-- توهج ناعم بالخلفية -->
    <div class="absolute w-[400px] h-[400px] rounded-full bg-cyan-500/5 blur-[120px] pointer-events-none"></div>
    
    <div class="max-w-md w-full bg-[#0d121f]/80 border border-slate-800 p-8 rounded-2xl text-center shadow-2xl backdrop-blur-xl relative z-10">
        <h1 class="text-3xl font-black mb-3 bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent">نشاط البراكين</h1>
        <p class="text-slate-400 text-xs leading-relaxed mb-6">البراكين هي فتحات在地باط الأرض تطلق منها الحمم البركانية والغازات. هناك أنواع مختلفة من البراكين، وكل نوع له خصائصه المميزة.</p>
        <button class="w-full bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-extrabold text-xs py-3 rounded-xl hover:opacity-90 shadow-lg shadow-cyan-500/20 transition-all" onclick="window.open('https://ar.wikipedia.org/wiki/%D8%AB%D9%88%D8%B1%D8%A7%D9%86')">معلومات أكثر</button>
    </div>
    
    <script src="script.js" defer></script>
</body>
</html>
