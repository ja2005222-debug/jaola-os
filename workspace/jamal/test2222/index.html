<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- استدعاء معزز ومباشر لأحدث نسخ المكتبات والخطوط لتفادي مشاكل الـ CORS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Tajawal:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Tajawal', 'Cairo', sans-serif; scroll-behavior: smooth; }
    </style>
    
    <title>مطعم بيتزا</title>
</head>
<body class="bg-[#080b11] text-slate-100 min-h-screen flex flex-col justify-center items-center p-6 selection:bg-cyan-500 selection:text-slate-900">
    <!-- توهج ناعم بالخلفية -->
    <div class="absolute w-[400px] h-[400px] rounded-full bg-cyan-500/5 blur-[120px] pointer-events-none"></div>
    
    <div class="max-w-md w-full bg-[#0d121f]/80 border border-slate-800 p-8 rounded-2xl text-center shadow-2xl backdrop-blur-xl relative z-10">
        <div class="text-4xl mb-4 animate-bounce">🍕</div>
        <h1 class="text-xl font-black mb-3 bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent">منيو المطعم</h1>
        <ul class="list-none m-0 p-0 flex flex-col justify-center items-center">
            <li class="mb-4"><span class="text-lg">بيتزا مارغريتا</span> <span class="text-slate-400">- 50 ر.س</span></li>
            <li class="mb-4"><span class="text-lg">بيتزا هاواي</span> <span class="text-slate-400">- 60 ر.س</span></li>
            <li class="mb-4"><span class="text-lg">بيتزا مارينارا</span> <span class="text-slate-400">- 55 ر.س</span></li>
        </ul>
        <button class="w-full bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-extrabold text-xs py-3 rounded-xl hover:opacity-90 shadow-lg shadow-cyan-500/20 transition-all" onclick="orderPizza()">اطلب الأن</button>
        <p id="orderPrice" class="text-lg text-slate-400 mt-4"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
