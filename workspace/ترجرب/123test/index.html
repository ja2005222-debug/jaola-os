<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- استدعاء معزز ومباشر لأحدث نسخ المكتبات والخطوط لتفادي مشاكل الـ CORS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Tajawal:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Tajawal', 'Cairo', sans-serif; scroll-behavior: smooth; }
    </style>
    
    <title>قالب عصري و書ية بارزة</title>
</head>
<body class="bg-[#05070f] text-slate-100 min-h-screen relative overflow-x-hidden selection:bg-cyan-500 selection:text-slate-950">
    <!-- توهج نيون خلفي ناعم -->
    <div class="absolute top-[-150px] left-[-150px] w-[500px] h-[500px] rounded-full bg-cyan-500/10 blur-[130px] pointer-events-none"></div>
    <div class="absolute bottom-[-200px] right-[-150px] w-[600px] h-[600px] rounded-full bg-indigo-500/8 blur-[160px] pointer-events-none"></div>

    <!-- نافبار زجاجي شفاف ومحاذاة دقيقة -->
    <header class="border-b border-slate-900 bg-[#05070f]/80 backdrop-blur-xl sticky top-0 z-50 px-8 py-4 flex items-center justify-between">
        <div class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent tracking-wide">قالب عصري والكتابه فيه بارزة</div>
        <nav class="hidden md:flex items-center gap-8 text-xs font-semibold text-slate-400">
            <a href="#students" class="hover:text-cyan-400 transition-all">الطلاب</a>
            <a href="#attendance" class="hover:text-cyan-400 transition-all">الحضور</a>
            <a href="#performance" class="hover:text-cyan-400 transition-all">أداء</a>
        </nav>
        <button class="bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-extrabold text-xs px-5 py-2.5 rounded-xl shadow-lg shadow-cyan-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all">المتابعة الآن</button>
    </header>

    <!-- قسم العرض الرئيسي الفاخر -->
    <main class="max-w-5xl mx-auto text-center px-6 py-28 flex flex-col items-center justify-center">
        <div class="inline-flex items-center gap-1.5 bg-cyan-950/40 border border-cyan-800/30 text-cyan-400 px-3.5 py-1.5 rounded-full text-[10px] font-bold tracking-wider mb-6 animate-pulse">
            🚀 قالب عصري
        </div>
        <h1 class="text-5xl font-black leading-tight mb-6">قالب عصري و書ية بارزة <br/><span class="bg-gradient-to-r from-cyan-400 via-teal-400 to-indigo-500 bg-clip-text text-transparent">للمساعدة في نجاح المشاريع</span></h1>
        <p class="text-slate-400 text-sm md:text-base leading-relaxed max-w-xl mb-12">هذا القالب مصمم ليوفر تجربة مستخدم رائعة ومحتوى بارز وجذاب.</p>
        
        <div class="flex flex-col sm:flex-row items-center gap-4">
            <button class="bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-extrabold text-xs px-8 py-3.5 rounded-xl shadow-lg shadow-cyan-500/25 hover:scale-[1.02] transition-all">استكشف المزيد 🚀</button>
            <button class="border border-slate-800 hover:bg-slate-900 text-xs text-slate-300 font-extrabold px-8 py-3.5 rounded-xl transition-all">دخول</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
